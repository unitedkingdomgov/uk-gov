<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUD Dashboard - Gestão de Estado</title>
    <style>
        /* Estilos Globais */
        :root {
            --bg-color: #0a0e17;
            --panel-bg: rgba(16, 24, 43, 0.8);
            --border-color: #1f3a5f;
            --text-main: #e2f1ff;
            --text-muted: #8b9bb4;
            --hud-glow: 0 0 10px rgba(31, 58, 95, 0.5);
            
            --color-bad: #ff3333;
            --color-mid: #ffcc00;
            --color-good: #00cc66;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(10, 14, 23, 0.9), rgba(10, 14, 23, 0.9)),
                linear-gradient(to right, #111d30 1px, transparent 1px),
                linear-gradient(to bottom, #111d30 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Tela de Login */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .login-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 8px;
            box-shadow: var(--hud-glow);
            text-align: center;
            width: 300px;
        }

        .login-box h2 { margin-top: 0; letter-spacing: 2px; }
        .login-box input {
            width: 100%; padding: 10px; margin: 15px 0;
            background: #000; border: 1px solid var(--border-color);
            color: #fff; border-radius: 4px; box-sizing: border-box;
            text-align: center; font-size: 16px; letter-spacing: 5px;
        }
        .login-btn {
            background: #1f3a5f; color: #fff; border: none;
            padding: 10px 20px; cursor: pointer; border-radius: 4px;
            width: 100%; margin-bottom: 10px; font-weight: bold;
            transition: 0.3s;
        }
        .login-btn:hover { background: #2a4d7d; }
        .guest-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); }
        .guest-btn:hover { background: rgba(255,255,255,0.1); }

        /* Painel Principal */
        #dashboard { display: none; padding: 20px; }
        
        .header {
            text-align: center; padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }
        .header h1 { margin: 0; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .category-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: var(--hud-glow);
            backdrop-filter: blur(5px);
        }

        .category-card h3 {
            margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px; font-size: 18px; letter-spacing: 1px;
            color: #64a6f8;
        }

        /* Estilo dos Status */
        .stat-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px; font-size: 14px;
        }

        .stat-label { width: 45%; }
        
        .stat-controls {
            display: flex; align-items: center; width: 55%; justify-content: space-between;
        }

        .btn-adjust {
            background: transparent; border: 1px solid var(--border-color);
            color: #fff; width: 24px; height: 24px; border-radius: 50%;
            cursor: pointer; font-size: 14px; display: flex;
            align-items: center; justify-content: center;
            display: none; /* Oculto por padrão, aparece só pro ADM */
            transition: 0.2s;
        }
        .btn-adjust:hover { background: rgba(255,255,255,0.2); }

        /* Barra de Progresso */
        .bar-container {
            flex-grow: 1; background: #000; height: 8px;
            margin: 0 10px; border-radius: 4px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .bar-fill {
            height: 100%; width: 50%; border-radius: 4px;
            transition: width 0.4s ease, background-color 0.4s ease, box-shadow 0.4s ease;
        }

        .stat-value {
            width: 30px; text-align: right; font-weight: bold; font-family: monospace; font-size: 16px;
        }

    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>SISTEMA</h2>
            <p style="color: var(--text-muted); font-size: 12px;">Acesso Restrito</p>
            <input type="password" id="admin-pass" placeholder="SENHA" onkeypress="handleEnter(event)">
            <button class="login-btn" onclick="loginAdmin()">ENTRAR COMO ADM</button>
            <button class="login-btn guest-btn" onclick="loginGuest()">Entrar como Visitante</button>
            <p id="login-error" style="color: var(--color-bad); display: none; font-size: 12px;">Senha incorreta.</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <h1>Dados Estatísticos do Reino Unido</h1>
            <p id="user-mode-display" style="color: var(--text-muted);"></p>
        </div>
        <div class="grid" id="main-grid">
            </div>
    </div>

    <script>
        // --- DADOS DO SISTEMA ---
        // Valor inicial definido como 50 (Mediano) para todos, mas você pode mudar.
        const structure = {
            "💰 Economia": ["PIB (GDP)", "Crescimento Econômico", "Produção", "Consumo", "Investimento", "Inflação", "Desemprego", "Dívida Pública", "Receita (impostos)", "Gastos Públicos"],
            "🏙️ Qualidade de Vida": ["Pobreza", "Desigualdade", "Satisfação Pública", "Bem-estar", "Acesso a Serviços"],
            "⚕️ Saúde": ["Acesso à Saúde", "Capacidade Hospitalar", "Mortalidade", "Expectativa de Vida"],
            "📚 Educação": ["Taxa de Alfabetização", "Acesso à Educação", "Nível Acadêmico"],
            "🚓 Criminalidade": ["Segurança Pública", "Eficiência Policial", "Estabilidade Interna"],
            "🏛️ Governo": ["Aprovação do Governo", "Estabilidade Política", "Eficiência Governamental"],
            "🌍 Relações Internacionais": ["Comércio Exterior", "Influência Global"],
            "🏗️ Infraestrutura": ["Transporte", "Energia", "Tecnologia"],
            "🍃 Meio Ambiente": ["Poluição", "Sustentabilidade", "Recursos Naturais"]
        };

        // Estado das variáveis (iniciando todas em 50)
        let statsData = {};
        for (let category in structure) {
            structure[category].forEach(stat => {
                statsData[stat] = 50; 
            });
        }

        let isAdmin = false;

        // --- FUNÇÕES DE LOGIN ---
        function handleEnter(e) { if (e.key === 'Enter') loginAdmin(); }

        function loginAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === '1322') {
                isAdmin = true;
                enterDashboard("Modo Administrador");
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function loginGuest() {
            isAdmin = false;
            enterDashboard("Modo Visitante");
        }

        function enterDashboard(modeText) {
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('user-mode-display').innerText = modeText;
                renderDashboard();
            }, 500);
        }

        // --- LÓGICA DE CORES (A REGRA PEDIDA) ---
        // 0 a 30: Ruim/Colapso (Vermelho)
        // 31 a 70: Mediano/Risco (Amarelo)
        // 71 a 100: Bom/Verde (Verde)
        function getColor(value) {
            if (value <= 30) return 'var(--color-bad)';
            if (value <= 70) return 'var(--color-mid)';
            return 'var(--color-good)';
        }

        // --- RENDERIZAÇÃO E ATUALIZAÇÃO ---
        function renderDashboard() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = ''; // Limpa antes de gerar

            for (let category in structure) {
                // Cria o Card da categoria
                let card = document.createElement('div');
                card.className = 'category-card';
                
                let title = document.createElement('h3');
                title.innerText = category;
                card.appendChild(title);

                // Cria cada estatística dentro da categoria
                structure[category].forEach(statName => {
                    let val = statsData[statName];

                    let row = document.createElement('div');
                    row.className = 'stat-row';

                    let label = document.createElement('div');
                    label.className = 'stat-label';
                    label.innerText = statName;

                    let controls = document.createElement('div');
                    controls.className = 'stat-controls';

                    // Botão Menos (-)
                    let btnMinus = document.createElement('button');
                    btnMinus.className = 'btn-adjust';
                    btnMinus.innerText = '-';
                    if (isAdmin) btnMinus.style.display = 'flex';
                    btnMinus.onclick = () => updateStat(statName, -1);

                    // Barra
                    let barContainer = document.createElement('div');
                    barContainer.className = 'bar-container';
                    
                    let barFill = document.createElement('div');
                    barFill.className = 'bar-fill';
                    barFill.id = 'bar-' + statName;
                    barFill.style.width = val + '%';
                    barFill.style.backgroundColor = getColor(val);
                    barFill.style.boxShadow = `0 0 8px ${getColor(val)}`;
                    barContainer.appendChild(barFill);

                    // Valor Numérico
                    let valueDisplay = document.createElement('div');
                    valueDisplay.className = 'stat-value';
                    valueDisplay.id = 'val-' + statName;
                    valueDisplay.innerText = val;
                    valueDisplay.style.color = getColor(val);

                    // Botão Mais (+)
                    let btnPlus = document.createElement('button');
                    btnPlus.className = 'btn-adjust';
                    btnPlus.innerText = '+';
                    if (isAdmin) btnPlus.style.display = 'flex';
                    btnPlus.onclick = () => updateStat(statName, 1);

                    // Monta a linha
                    controls.appendChild(btnMinus);
                    controls.appendChild(barContainer);
                    controls.appendChild(valueDisplay);
                    controls.appendChild(btnPlus);

                    row.appendChild(label);
                    row.appendChild(controls);
                    card.appendChild(row);
                });

                grid.appendChild(card);
            }
        }

        // Função para atualizar o valor manualmente
        function updateStat(statName, change) {
            let newVal = statsData[statName] + change;
            
            // Trava entre 0 e 100
            if (newVal < 0) newVal = 0;
            if (newVal > 100) newVal = 100;
            
            statsData[statName] = newVal;

            // Atualiza o visual no HTML (Barra, Texto e Cor)
            let bar = document.getElementById('bar-' + statName);
            let valText = document.getElementById('val-' + statName);
            let color = getColor(newVal);

            bar.style.width = newVal + '%';
            bar.style.backgroundColor = color;
            bar.style.boxShadow = `0 0 8px ${color}`;
            
            valText.innerText = newVal;
            valText.style.color = color;
        }

    </script>
</body>
</html>
